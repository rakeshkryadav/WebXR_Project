<!DOCTYPE html>
<html lang="en">
    <head>
        <title>AR | UFS Digital</title>
        <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
        <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.2/aframe/build/aframe-ar.js"></script>
    </head>
    <body style="margin:0; overflow:hidden;">

        <a-scene embedded arjs>
            <a-marker preset="hiro" smooth>

                <a-entity
                    position="0 0 0"
                    rotation="90 45 45"
                    scale="0.5 0.5 0.5"
                    gltf-model="https://arjs-blog-post.vercel.app/assets/3sc.gltf"
                    3sc-model>
                </a-entity>

            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>

    </body>
</html>
